server:
  port: 8084

spring:
  application:
    name: waiting-room-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/baseball_platform}
    username: ${SPRING_DATASOURCE_USERNAME:baseball}
    password: ${SPRING_DATASOURCE_PASSWORD:baseball}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

app:
  waiting-room:
    queue:
      stale-entry-ttl-ms: ${WAITING_ROOM_STALE_ENTRY_TTL_MS:600000}
    admission:
      ticket-service-name: ${WAITING_ROOM_TICKET_SERVICE_NAME:ticket-service}
      capacity-per-pod-per-minute: ${WAITING_ROOM_TICKET_SERVICE_CAPACITY_PER_POD_PER_MINUTE:20}
      fallback-ready-pods: ${WAITING_ROOM_TICKET_SERVICE_FALLBACK_READY_PODS:1}
      kubernetes-enabled: ${WAITING_ROOM_KUBERNETES_CAPACITY_ENABLED:true}
      cache-ttl-ms: ${WAITING_ROOM_CAPACITY_CACHE_TTL_MS:5000}
      max-ticket-service-pods: ${WAITING_ROOM_TICKET_SERVICE_MAX_PODS:10}
      scale-target-waiting-users-per-pod: ${WAITING_ROOM_SCALE_TARGET_WAITING_USERS_PER_POD:20}
      scale-warmup-seconds: ${WAITING_ROOM_SCALE_WARMUP_SECONDS:60}
      db-pressure:
        enabled: ${WAITING_ROOM_DB_PRESSURE_ENABLED:true}
        connection-budget: ${WAITING_ROOM_DB_CONNECTION_BUDGET:60}
        caution-threshold: ${WAITING_ROOM_DB_CAUTION_THRESHOLD:40}
        warning-threshold: ${WAITING_ROOM_DB_WARNING_THRESHOLD:50}
        critical-threshold: ${WAITING_ROOM_DB_CRITICAL_THRESHOLD:55}
        cache-ttl-ms: ${WAITING_ROOM_DB_PRESSURE_CACHE_TTL_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8087

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:postgresql://localhost:5432/baseball_platform
    username: baseball
    password: baseball
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    aws:
      region:
        static: ap-northeast-2
      sqs:
        endpoint: ${SPRING_CLOUD_AWS_SQS_ENDPOINT:http://localhost:9324}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus # 헬스체크와 프로메테우스 엔드포인트 개방
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name} # 나중에 그라파나에서 서비스별로 필터링하기 위한 태그

app:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security-protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    sasl-mechanism: ${KAFKA_SASL_MECHANISM:}
    topics:
      ticket-domain-events: ${KAFKA_TOPIC_TICKET_DOMAIN_EVENTS:ticket.domain.events}
  ticket-events:
    queue-name: ${TICKET_EVENT_QUEUE_NAME:ticket-domain-events}
    ticket-confirm-queue-name: ${SQS_TICKET_CONFIRM_QUEUE_NAME:ticket-confirm-queue}
    publisher:
      fixed-delay-ms: ${TICKET_EVENT_PUBLISHER_FIXED_DELAY_MS:2000}
      initial-delay-ms: ${TICKET_EVENT_PUBLISHER_INITIAL_DELAY_MS:10000}
      batch-size: ${TICKET_EVENT_PUBLISHER_BATCH_SIZE:20}
      max-attempts: ${TICKET_EVENT_PUBLISHER_MAX_ATTEMPTS:10}
      lease-seconds: ${TICKET_EVENT_PUBLISHER_LEASE_SECONDS:600}
      lease-recovery-delay-ms: ${TICKET_EVENT_LEASE_RECOVERY_DELAY_MS:60000}

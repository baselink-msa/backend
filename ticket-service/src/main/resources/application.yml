server:
  port: 8087

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:postgresql://localhost:5432/baseball_platform
    username: baseball
    password: baseball
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    aws:
      region:
        static: ap-northeast-2
      sqs:
        endpoint: ${SPRING_CLOUD_AWS_SQS_ENDPOINT:http://localhost:9324}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus # 헬스체크와 프로메테우스 엔드포인트 개방
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name} # 나중에 그라파나에서 서비스별로 필터링하기 위한 태그
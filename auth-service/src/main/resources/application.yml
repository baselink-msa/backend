server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/baseball_platform
    username: baseball
    password: baseball
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    schemas: auth_schema,game_schema,ticket_schema,order_schema,chatbot_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:local-dev-jwt-secret-key-change-me-please-32bytes-minimum}
    expiration-ms: 3600000

logging:
  level:
    com.baseball.auth: DEBUG

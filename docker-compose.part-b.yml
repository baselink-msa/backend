services:
  postgres:
    image: postgres:16
    container_name: baseball-postgres-partb
    environment:
      POSTGRES_USER: baseball
      POSTGRES_PASSWORD: baseball
      POSTGRES_DB: baseball_platform
    ports:
      - "5432:5432"
    volumes:
      - baseball-pgdata-partb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseball -d baseball_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:alpine
    container_name: baseball-redis
    ports:
      - "6379:6379"

  sqs:
    image: softwaremill/elasticmq-native
    container_name: baseball-sqs
    ports:
      - "9324:9324"
      - "9325:9325"

volumes:
  baseball-pgdata-partb:

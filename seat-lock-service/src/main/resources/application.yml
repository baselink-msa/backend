server:
  port: 8086

spring:
  application:
    name: seat-lock-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/baseball_platform}
    username: ${SPRING_DATASOURCE_USERNAME:baseball}
    password: ${SPRING_DATASOURCE_PASSWORD:baseball}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

app:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security-protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    sasl-mechanism: ${KAFKA_SASL_MECHANISM:}
    topics:
      reservation-lifecycle-events: ${KAFKA_TOPIC_RESERVATION_LIFECYCLE_EVENTS:reservation.lifecycle.events}
